<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — RentEase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="authModalTitle">Welcome Back</h3>
        <button class="modal-close" onclick="closeAuthModal()">&times;</button>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Sign Up</button>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Sign In</button>
      </form>
      <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="regPhone">Phone Number</label>
          <input type="tel" id="regPhone" placeholder="+91 9876543210">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">Create Account</button>
      </form>
    </div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon"><i class="fas fa-couch"></i></div>
        RentEase
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="catalog.html">Catalog</a></li>
        <li><a href="catalog.html?category=Living+Room">Living Room</a></li>
        <li><a href="catalog.html?category=Appliances">Appliances</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="nav-cart" title="Cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="badge" id="cartBadge">0</span>
        </a>
        <button class="btn btn-sm btn-outline" id="authBtn" onclick="openAuthModal()">Sign In</button>
        <div class="hidden" id="userMenu" style="display:none;align-items:center;gap:8px;">
          <button class="btn btn-sm btn-secondary" id="userMenuBtn">
            <i class="fas fa-user-circle"></i> <span id="userName">User</span>
          </button>
          <button class="btn btn-sm btn-ghost" onclick="logout()" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
        <button class="mobile-toggle" id="mobileToggle" onclick="toggleMobileMenu()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <section class="product-detail">
    <div class="container">
      <div id="productContent">
        <div class="grid grid-2" style="gap:40px;">
          <div class="product-gallery skeleton" style="min-height:400px;"></div>
          <div class="product-info">
            <div class="skeleton" style="height:16px;width:40%;margin-bottom:16px;"></div>
            <div class="skeleton" style="height:32px;width:80%;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:20px;width:50%;margin-bottom:20px;"></div>
            <div class="skeleton" style="height:80px;width:100%;margin-bottom:28px;"></div>
            <div class="skeleton" style="height:200px;width:100%;margin-bottom:24px;"></div>
            <div class="skeleton" style="height:100px;width:100%;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <h3>🏠 RentEase</h3>
          <p>India's most trusted furniture and appliance rental platform.</p>
        </div>
        <div class="footer-col">
          <h4>Quick Links</h4>
          <ul>
            <li><a href="catalog.html">Browse Catalog</a></li>
            <li><a href="index.html">Home</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>Support</h4>
          <ul>
            <li><a href="#">Help Center</a></li>
            <li><a href="#">Contact Us</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 RentEase. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    let product = null;
    let selectedTenure = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      if (!productId) {
        window.location.href = 'catalog.html';
        return;
      }
      try {
        product = await API.getProduct(productId);
        selectedTenure = product.tenureOptions[product.tenureOptions.length - 1];
        renderProduct(product);
        document.title = `${product.name} — RentEase`;
      } catch (err) {
        console.error('Error loading product:', err);
        document.getElementById('productContent').innerHTML = `
          <div class="text-center" style="padding:80px 20px;">
            <div style="font-size:4rem;margin-bottom:20px;">😕</div>
            <h2>Product Not Found</h2>
            <p class="mt-1 text-muted">The product you're looking for doesn't exist.</p>
            <a href="catalog.html" class="btn btn-primary mt-3">Back to Catalog</a>
          </div>
        `;
      }
    });

    function renderProduct(p) {
      currentProduct = p;                              // ← YEH ADD KAR
      selectedTenureIdx = p.tenureOptions.length - 1;  // ← YEH ADD KAR
      const container = document.getElementById('productContent');
      const defaultIdx = p.tenureOptions.length - 1;
      
      container.innerHTML = `
        <div class="grid grid-2" style="gap:40px;align-items:start;">
          <div class="product-gallery">
            <img src="${p.image}" alt="${p.name}" id="mainImage" onerror="this.src='https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800'">
            ${!p.availability ? '<div style="position:absolute;top:16px;left:16px;background:var(--danger);color:white;padding:6px 16px;border-radius:var(--radius-full);font-size:0.8rem;font-weight:700;">Out of Stock</div>' : ''}
          </div>
          <div class="product-info">
            <div class="breadcrumb">
              <a href="index.html">Home</a> <span>/</span>
              <a href="catalog.html?category=${encodeURIComponent(p.category)}">${p.category}</a> <span>/</span>
              <span style="color:var(--text-primary);">${p.name}</span>
            </div>
            <h1 class="product-title">${p.name}</h1>
            <div class="product-meta">
              <span class="rating-stars">${getStarRating(p.rating)}</span>
              <span>${p.rating} (${p.numReviews} reviews)</span>
              ${p.brand ? `<span>•</span><span>${p.brand}</span>` : ''}
              <span>•</span>
              <span style="color:${p.availability ? 'var(--success)' : 'var(--danger)'};">● ${p.availability ? 'Available' : 'Unavailable'}</span>
            </div>
            <p class="product-desc">${p.description}</p>
            ${p.features && p.features.length > 0 ? `
              <ul class="features-list">
                ${p.features.map(f => `<li><span class="check">✓</span> ${f}</li>`).join('')}
              </ul>
            ` : ''}
            <div class="tenure-selector">
              <h4><i class="fas fa-calendar-alt text-accent"></i> Choose Your Rental Plan</h4>
              <div class="tenure-options">
                ${p.tenureOptions.map((t, idx) => `
                  <div class="tenure-option ${idx === defaultIdx ? 'selected' : ''}" onclick="selectTenure(${idx})" id="tenure-${idx}">
                    ${idx === defaultIdx ? '<span class="best-value">Best Value</span>' : ''}
                    <div class="duration">${t.months} Month${t.months > 1 ? 's' : ''}</div>
                    <div class="price">₹${t.monthlyRent.toLocaleString()}</div>
                    <div class="price-period">per month</div>
                    ${t.discount > 0 ? `<div class="save-badge">Save ${t.discount}%</div>` : ''}
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="price-summary" id="priceSummary"></div>
            <div class="flex gap-2">
              <button class="btn btn-primary btn-lg" style="flex:2;" onclick="addProductToCart()" ${!p.availability ? 'disabled style="flex:2;opacity:0.5;cursor:not-allowed;"' : ''}>
                <i class="fas fa-shopping-cart"></i> Add to Cart
              </button>
              <a href="cart.html" class="btn btn-secondary btn-lg" style="flex:1;">
                <i class="fas fa-bolt"></i> Rent Now
              </a>
            </div>
            <p class="mt-2 text-muted" style="font-size:0.85rem;">
              <i class="fas fa-shield-alt text-accent"></i> Refundable deposit: ₹${p.deposit.toLocaleString()} &nbsp;|&nbsp;
              <i class="fas fa-truck text-accent"></i> Free delivery & installation
            </p>
          </div>
        </div>
      `;
      updatePriceSummary();
    }
        // ==================== TENURE & CART FUNCTIONS ====================
    let currentProduct = null;
    let selectedTenureIdx = 0;

    // Call this inside renderProduct — store the product globally
    // (Add this line at the START of renderProduct: currentProduct = p; selectedTenureIdx = p.tenureOptions.length - 1;)

    function selectTenure(idx) {
      selectedTenureIdx = idx;
      // Update UI - highlight selected
      document.querySelectorAll('.tenure-option').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
      updatePriceSummary();
    }

    function updatePriceSummary() {
      if (!currentProduct) return;
      const t = currentProduct.tenureOptions[selectedTenureIdx];
      const total = t.monthlyRent * t.months;
      const summary = document.getElementById('priceSummary');
      if (summary) {
        summary.innerHTML = `
          <div style="display:flex;justify-content:space-between;padding:8px 0;">
            <span>Monthly Rent</span>
            <strong>₹${t.monthlyRent.toLocaleString()}/mo</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;">
            <span>Tenure</span>
            <strong>${t.months} months</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border-light);margin-top:6px;">
            <span>Total Rent</span>
            <strong style="color:var(--primary);">₹${total.toLocaleString()}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;">
            <span>Refundable Deposit</span>
            <strong>₹${currentProduct.deposit.toLocaleString()}</strong>
          </div>
        `;
      }
    }

    function addProductToCart() {
      if (!currentProduct) return;
      const t = currentProduct.tenureOptions[selectedTenureIdx];

      const cartItem = {
        productId: currentProduct._id,
        name: currentProduct.name,
        image: currentProduct.image,
        category: currentProduct.category || '',
        tenure: t.months,
        monthlyRent: t.monthlyRent,
        deposit: currentProduct.deposit,
        quantity: 1,
      };

      addToCartDirect(cartItem);
      showToast('Added to cart successfully!', 'success');
    }
    // ==================== END ====================
    function selectTenure(idx) {
      selectedTenure = product.tenureOptions[idx];
      document.querySelectorAll('.tenure-option').forEach(el => el.classList.remove('selected'));
      document.getElementById(`tenure-${idx}`).classList.add('selected');
      updatePriceSummary();
    }

    function updatePriceSummary() {
      if (!selectedTenure || !product) return;
      const summary = document.getElementById('priceSummary');
      const totalRent = selectedTenure.monthlyRent * selectedTenure.months;
      const originalTotal = product.tenureOptions[0].monthlyRent * selectedTenure.months;
      const savings = originalTotal - totalRent;

      summary.innerHTML = `
        <div class="summary-row"><span>Monthly Rent</span><span>₹${selectedTenure.monthlyRent.toLocaleString()}</span></div>
        <div class="summary-row"><span>Tenure</span><span>${selectedTenure.months} month${selectedTenure.months > 1 ? 's' : ''}</span></div>
        ${savings > 0 ? `<div class="summary-row"><span>Total Savings</span><span class="discount">-₹${savings.toLocaleString()}</span></div>` : ''}
        <div class="summary-row"><span>Refundable Deposit</span><span>₹${product.deposit.toLocaleString()}</span></div>
        <div class="summary-row"><span>Delivery & Installation</span><span style="color:var(--success);">FREE</span></div>
        <div class="summary-row total"><span>Total Rent (${selectedTenure.months}mo)</span><span class="value highlight">₹${totalRent.toLocaleString()}</span></div>
        <div class="summary-row" style="font-size:0.85rem;color:var(--text-secondary);border:none;padding-top:4px;">
          <span>Effective monthly cost</span>
          <span style="font-weight:700;color:var(--primary);">₹${selectedTenure.monthlyRent.toLocaleString()}/mo</span>
        </div>
      `;
    }

    function addProductToCart() {
      if (!product || !selectedTenure) return;
      const cartItem = {
        productId: product._id,
        name: product.name,
        image: product.image,
        category: product.category,
        tenure: selectedTenure.months,
        monthlyRent: selectedTenure.monthlyRent,
        deposit: product.deposit,
        quantity: 1,
      };
      addToCartDirect(cartItem);
      showToast(`${product.name} added to cart!`, 'success');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — RentEase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="logo-icon"><i class="fas fa-couch"></i></div>
      RentEase
    </a>
    <p class="auth-subtitle">Welcome back! Please sign in to your account.</p>

    <form onsubmit="handlePageLogin(event)">
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Enter your password" required minlength="6">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.85rem;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text-secondary);">
          <input type="checkbox" style="width:auto;"> Remember me
        </label>
        <a href="#" style="color:var(--accent);font-weight:600;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
    <p class="auth-switch" style="margin-top:8px;">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // If already logged in, redirect to dashboard
    document.addEventListener('DOMContentLoaded', () => {
      const user = getStoredUser();
      if (user && user.token) {
        if (user.role === 'admin') window.location.href = 'admin.html';
        else window.location.href = 'dashboard.html';
      }
    });

    async function handlePageLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader loader-dark"></span> Signing in...';
      try {
        const data = await API.login({ email, password });
        setStoredUser(data);
        showToast(`Welcome back, ${data.name}!`, 'success');
        setTimeout(() => {
          if (data.role === 'admin') window.location.href = 'admin.html';
          else window.location.href = 'dashboard.html';
        }, 800);
      } catch (err) {
        showToast(err.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    }
  </script>
</body>
</html>
